# =============================================================================
# Snakemake cluster profile for SLURM (Snakemake <= 7.x, generic --cluster mode)
#
# Usage:
#   snakemake --profile profiles/slurm
#
# This submits every rule as its own sbatch job. Per-rule cpu/mem/time/partition
# come from each rule's `threads:` and `resources:` block in the Snakefile —
# this file just wires them into the sbatch command line.
# =============================================================================

jobs: 6                   # max number of concurrent SLURM jobs
latency-wait: 60          # seconds to tolerate filesystem/NFS lag before a
                           # finished job's output files become visible
keep-going: True           # keep running independent branches if one job fails
rerun-incomplete: True
printshellcmds: True

# Fallback values used only if a rule doesn't set its own resources.
default-resources:
  - mem_mb=8000
  - time_min=60
  - partition=irbio01

# Generic cluster submission command. Snakemake fills in {rule}, {wildcards},
# {threads}, {resources.xxx} per job.
cluster: "/usr/bin/sbatch --partition={resources.partition} --job-name=malexa.{rule} --nodes=1 --cpus-per-task={threads} --mem={resources.mem_mb} --time={resources.time_min} --output=logs/slurm/{rule}_%j.out --error=logs/slurm/{rule}_%j.err --parsable"

# Lets Snakemake ask `sacct` whether a submitted job actually succeeded,
# instead of only inferring it from whether output files showed up.
cluster-status: profiles/slurm/slurm-status.py
