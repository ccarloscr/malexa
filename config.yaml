# =============================================================================
# config.yaml — MALEXA: MAchine Learning EXpression Algorithms
#
# Pipeline parameters are controlled from this file
# CLI options override this file.
# =============================================================================


# -----------------------------------------------------------------------------
# Paths
# -----------------------------------------------------------------------------
data:
  counts_file:   "data/raw/counts.parquet"    # genes x samples (CSV or Parquet format)
  clinical_file: "data/raw/clinical.csv"      # samples x features (CSV format)
  sample_id_col: "sample_id"                  # column name in clinical CSV that matches count matrix columns
  output_dir:    "results"

outputs:
  # Generated by 01_load_clean_data.py
  step_01:
    expression: "{output_dir}/counts_clean.csv"
    clinical:   "{output_dir}/clinical_clean.csv"
    qc_report:  "{output_dir}/qc_01.json"
  # Generated by 02_generate_cv_splits.py
  step_02:
    splits:     "{output_dir}/splits_{task}.json"


# -----------------------------------------------------------------------------
# Pre-processing thresholds (applied in 01_load_clean_data.py)
# -----------------------------------------------------------------------------
preprocessing:
  max_gene_missing_frac:   0.25   # drop gene if >25 % of samples have missing raw counts
  max_sample_missing_frac: 0.25   # drop sample if >25 % of genes have missing raw counts


# -----------------------------------------------------------------------------
# Clinical column names
# Used by 01_load_clean_data.py (standardization) and 02_generate_cv_splits.py
# (label extraction). Keep in sync with the actual column names in the CSV.
# -----------------------------------------------------------------------------
clinical_columns:          
  mutation_status:                # binary mutation-status columns to standardize
    - "EGFR_mutation_status"
    - "KRAS_mutation_status"


# -----------------------------------------------------------------------------
# Cross-validation
# -----------------------------------------------------------------------------
cv:
  method: RepeatedStratifiedKFold   # Outter CV method: StratifiedKFold, RepeatedStratifiedKFold, StratifiedShuffleSplit
  random_seed: 123                  # Fixed seed for reproducibility across tasks and models
  n_splits: 5                       # Number of stratified k-folds (required for StratifiedKFold & RepeatedStratifiedKFold)
  n_repeats: 3                     # Number of repetitions (required for RepeatedStratifiedKFold)
  test_size: 0.2                    # Proportion (float) or absolute number (int) os samples to include in test split. (StratifiedShuffleSplit only)
  inner_n_splits: 2                 # Number of inner CV folds for hyperparameter tuning
  inner_method: StratifiedKFold     # Inner CV method (for hyperparameter search)
  inner_n_repeats: 2                # Only if inner_method = RepeatedStratifiedKFold
  inner_test_size: 0.2              # Only if inner_method = StratifiedShuffleSplit


# -----------------------------------------------------------------------------
# Fold-local feature selection (applied inside 03_train_model.py on training
# data only, to avoid leakage).
# -----------------------------------------------------------------------------
feature_selection:
  min_cpm:              10.0   # genes with median CPM < this across training samples are removed
  min_variance_pct:     25     # bottom X % of genes by variance on training samples are removed
                               # (applied after CPM filter; 10 = drop the lowest-variance decile)


# -----------------------------------------------------------------------------
# Tasks
# Each task specifies:
#   label_col  : column in clean clinical CSV to use as the prediction target
#   models     : list of model keys (must match a key under `models` below)
#   pos_label  : value of the positive class (after binarization where applicable)
# -----------------------------------------------------------------------------
tasks:
  EGFR_mutation:
    label_col: "EGFR_mutation_status"   # already {0,1} after 01_load_clean_data.py
    models:
      - elasticnet_logreg
      - xgboost
    pos_label: 1                        # 1 = Mutant
    exclude_genes:
    - "ENSG00000146648.19"              # EGFR gene_id

  KRAS_mutation:
    label_col: "KRAS_mutation_status"   # already {0,1} after 01_load_clean_data.py
    models:
      - elasticnet_logreg
      - xgboost
    pos_label: 1                        # 1 = Mutant
    exclude_genes:
      - "ENSG00000133703.13"            # KRAS gene_id


# -----------------------------------------------------------------------------
# Models and hyperparameter grids
#
# Each model entry must have:
#   estimator_class  : dotted import path understood by 03_train_model.py
#   search_strategy  : "grid" | "random"   (RandomizedSearchCV vs GridSearchCV)
#   n_iter           : only used when search_strategy == "random"
#   scoring          : sklearn scorer string used for hyperparameter selection
#   param_grid       : dict of parameter names -> lists of values to search
#
# Note: all params use the sklearn pipeline step prefix, e.g. "clf__C".
# The training script wraps the estimator in a Pipeline with step name "clf".
# -----------------------------------------------------------------------------
models:

  elasticnet_logreg:
    estimator_class: "sklearn.linear_model.LogisticRegression"
    search_strategy: grid
    scoring:         "roc_auc"
    fixed_params:
      solver:       "saga"                          # required for elasticnet penalty
      penalty:      "elasticnet"
      max_iter:     5000
      random_state: 123
      n_jobs:       4
    param_grid:
      clf__C:         [0.001, 0.01, 0.1, 1.0, 10.0]
      clf__l1_ratio:  [0.1, 0.3, 0.5, 0.7, 0.9]     # 0=Ridge, 1=Lasso
      clf__class_weight: ["balanced", null]

  xgboost:
    estimator_class: "xgboost.XGBClassifier"
    search_strategy: random
    n_iter: 15
    scoring: "roc_auc"
    fixed_params:
      random_state:    123
      n_jobs:          4
      verbosity:       0
      eval_metric:     "logloss"
    param_grid:
      clf__n_estimators:   [100, 300, 500]
      clf__max_depth:      [3, 5, 7]
      clf__learning_rate:  [0.01, 0.05, 0.1]
      clf__subsample:      [0.7, 1.0]
      clf__colsample_bytree: [0.5, 0.7, 1.0]
      clf__scale_pos_weight: [1, 6, 12]

# -----------------------------------------------------------------------------
# Evaluation metrics computed in 03_train_model.py and aggregated in
# 04_aggregate_metrics.py.
# Add metric names that sklearn.metrics supports via its scorer interface.
# -----------------------------------------------------------------------------
evaluation:
  metrics:
    - roc_auc
    - average_precision        # PR-AUC; more informative under class imbalance
    - balanced_accuracy
    - f1_weighted
    - matthews_corrcoef
  primary_metric: "roc_auc"   # used for model comparison plot and ranking
  threshold:      0.5         # decision threshold for converting predicted probabilities to binary labels


# -----------------------------------------------------------------------------
# Interpretation / reporting (05_interpret_report.py)
# -----------------------------------------------------------------------------
interpretation:
  top_n_genes:    25    # report the top-N most important genes per task
  aggregation:    "mean_rank"   # how to combine importance across folds:
                                #   "mean_rank"  -> rank genes per fold, average ranks
                                #   "mean_importance" -> average raw importance scores
